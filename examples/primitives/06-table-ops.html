<!doctype html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:,">
<title>Dense ops table</title>
<meta name="description" content="Dense operations table primitive with sortable columns, status filters, and row-count provenance.">
<meta property="og:title" content="Dense ops table">
<meta property="og:description" content="Dense operations table primitive with sortable columns, status filters, and row-count provenance.">
<meta property="og:type" content="article">
<meta property="og:site_name" content="render-as-html">
<meta name="twitter:card" content="summary">
<style>
  :root {
    --paper:#faf6ef; --paper-tint:#f3ede1; --paper-card:#fbf7f0;
    --ink:#1a1815; --ink-soft:#4a443c; --muted:#736d62;
    --rule:#d9d1c2; --rule-soft:#ece5d6;
    --accent:#8a3a1a; --accent-2:#c2901a;
    --ok:#2f7d44; --warn:#9b641d; --note:#2f6fb3;
    --font-sans: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    --font-mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --paper:#1a1815; --paper-tint:#221f1a; --paper-card:#211e19;
      --ink:#f0eee8; --ink-soft:#c9c3b6; --muted:#9a948a;
      --rule:#38332b; --rule-soft:#2c2820;
      --accent:#e0794f; --accent-2:#d8a73a;
      --ok:#5cae6f; --warn:#c79a4a; --note:#6f9fd0;
    }
  }
  html, body { background: var(--paper); color: var(--ink); font-family: var(--font-sans); margin:0; }
  body { padding: 32px; font-size: 14px; line-height: 1.5; }
  .stage { max-width: 720px; margin: 0 auto; }
  .tile { background: var(--paper-card); border: 1px solid var(--rule); border-radius: 6px; padding: 16px 18px 14px; }
  .tile-head { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--rule-soft); padding-bottom: 10px; margin-bottom: 12px; gap: 12px; }
  .tile-title { font-weight: 700; font-size: 13px; color: var(--ink); letter-spacing: 0.01em; }
  .tile-meta { font-family: var(--font-mono); font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .toolbar { display: flex; gap: 6px; align-items: center; margin-bottom: 8px; flex-wrap: wrap; }
  .toolbar .search { font: inherit; font-size: 12px; background: var(--paper); color: var(--ink); border: 1px solid var(--rule); border-radius: 3px; padding: 4px 8px; width: 180px; }
  .toolbar .search::placeholder { color: var(--muted); }
  .toolbar .pill-filter { all: unset; cursor: pointer; font-family: var(--font-mono); font-size: 11px; padding: 3px 8px; border-radius: 3px; border: 1px solid var(--rule); color: var(--ink); background: var(--paper); letter-spacing: 0.02em; }
  .toolbar .pill-filter:hover { background: var(--paper-tint); }
  .toolbar .pill-filter.active { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .toolbar .pill-filter .ct { margin-left: 4px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .toolbar .pill-filter.active .ct { color: var(--paper-tint); }
  .toolbar .right { margin-left: auto; font-family: var(--font-mono); font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  thead th { text-align: left; font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); padding: 6px 10px 8px; border-bottom: 1px solid var(--rule); cursor: pointer; user-select: none; white-space: nowrap; }
  thead th.num { text-align: right; }
  thead th .arrow { opacity: 0; margin-left: 4px; }
  thead th.sorted-asc .arrow, thead th.sorted-desc .arrow { opacity: 1; color: var(--accent); }
  thead th.sorted-asc .arrow::after { content: '▲'; }
  thead th.sorted-desc .arrow::after { content: '▼'; }
  thead th:hover { color: var(--ink); }
  tbody tr { border-bottom: 1px solid var(--rule-soft); }
  tbody tr:hover { background: var(--paper-tint); }
  tbody td { padding: 7px 10px; color: var(--ink); font-variant-numeric: tabular-nums; vertical-align: middle; }
  tbody td.mono { font-family: var(--font-mono); font-size: 12px; }
  tbody td.num { text-align: right; font-family: var(--font-mono); font-size: 12px; }
  tbody td.muted-col { color: var(--ink-soft); }
  .pill { display: inline-flex; align-items: center; gap: 5px; font-family: var(--font-mono); font-size: 11px; padding: 2px 7px; border-radius: 3px; border: 1px solid currentColor; background: transparent; letter-spacing: 0.02em; text-transform: lowercase; }
  .pill .pdot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .pill.open { color: var(--ok); }
  .pill.closed { color: var(--muted); }
  .pill.filtered { color: var(--warn); }
  .pill.error { color: var(--accent); }
  tfoot td { padding: 8px 10px 2px; font-family: var(--font-mono); font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  tfoot .right { text-align: right; }
  .empty-state { padding: 24px; text-align: center; color: var(--muted); font-style: italic; font-size: 13px; }
  @media (max-width: 560px) {
    body { padding: 18px 12px; }
    .tile { padding: 14px 12px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    .tile-head { align-items: flex-start; }
    .toolbar .search { width: min(100%, 240px); font-size: 16px; }
    table { min-width: 560px; }
  }
</style>
</head>
<body>
<div class="stage">
  <div class="tile">
    <div class="tile-head">
      <div class="tile-title">Port scan · 10.0.0.0/24</div>
      <div class="tile-meta">2026-05-20 14:32 · nmap -sV</div>
    </div>
    <div class="toolbar">
      <input class="search" id="search" type="search" placeholder="search host or service…" aria-label="Search host or service">
      <button class="pill-filter" data-st="open">open <span class="ct" id="ctOpen">0</span></button>
      <button class="pill-filter" data-st="filtered">filtered <span class="ct" id="ctFil">0</span></button>
      <button class="pill-filter" data-st="closed">closed <span class="ct" id="ctClo">0</span></button>
      <button class="pill-filter" data-st="error">error <span class="ct" id="ctErr">0</span></button>
      <span class="right" id="footRight">14 of 14 rows</span>
    </div>
    <table id="tbl">
      <thead>
        <tr>
          <th data-col="host" data-type="str">Host<span class="arrow"></span></th>
          <th data-col="port" data-type="num" class="num">Port<span class="arrow"></span></th>
          <th data-col="service" data-type="str">Service<span class="arrow"></span></th>
          <th data-col="status" data-type="str">Status<span class="arrow"></span></th>
          <th data-col="latency" data-type="num" class="num">Latency<span class="arrow"></span></th>
          <th data-col="seen" data-type="num" class="num">Last seen<span class="arrow"></span></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
      <tfoot>
        <tr>
          <td colspan="4" id="footLeft">14 rows · 4 open · 3 filtered · 6 closed · 1 error</td>
          <td colspan="2" class="right">median 24ms</td>
        </tr>
      </tfoot>
    </table>
  </div>
</div>
<script>
  const rows = [
    { host:'10.0.0.4',  port:22,   service:'ssh',         status:'open',     latency:12,   seen:30 },
    { host:'10.0.0.4',  port:80,   service:'http',        status:'open',     latency:18,   seen:30 },
    { host:'10.0.0.4',  port:443,  service:'https',       status:'open',     latency:22,   seen:30 },
    { host:'10.0.0.11', port:22,   service:'ssh',         status:'filtered', latency:null, seen:45 },
    { host:'10.0.0.11', port:5432, service:'postgresql',  status:'open',     latency:14,   seen:45 },
    { host:'10.0.0.11', port:6379, service:'redis',       status:'filtered', latency:null, seen:45 },
    { host:'10.0.0.18', port:80,   service:'http',        status:'closed',   latency:null, seen:60 },
    { host:'10.0.0.18', port:8080, service:'http-proxy',  status:'closed',   latency:null, seen:60 },
    { host:'10.0.0.22', port:25,   service:'smtp',        status:'filtered', latency:null, seen:30 },
    { host:'10.0.0.22', port:587,  service:'submission',  status:'closed',   latency:null, seen:30 },
    { host:'10.0.0.31', port:9090, service:'prometheus',  status:'error',    latency:2841, seen:90 },
    { host:'10.0.0.31', port:3000, service:'grafana',     status:'closed',   latency:null, seen:90 },
    { host:'10.0.0.48', port:22,   service:'ssh',         status:'closed',   latency:null, seen:30 },
    { host:'10.0.0.48', port:443,  service:'https',       status:'closed',   latency:null, seen:30 },
  ];
  let sortCol = null, sortDir = 0;
  let filterStatus = null;
  let query = '';
  function relSeen(s) { if (s<60) return s+'s ago'; if (s<3600) return Math.round(s/60)+'m ago'; return Math.round(s/3600)+'h ago'; }
  function render() {
    const tbody = document.getElementById('tbody');
    let working = [...rows];
    if (sortCol) {
      const t = document.querySelector(`th[data-col="${sortCol}"]`).dataset.type;
      working.sort((a,b) => {
        const av=a[sortCol], bv=b[sortCol];
        if (av==null && bv==null) return 0;
        if (av==null) return 1;
        if (bv==null) return -1;
        if (t==='num') return (av-bv)*sortDir;
        return String(av).localeCompare(String(bv))*sortDir;
      });
    }
    const visible = [];
    tbody.innerHTML = '';
    working.forEach(r => {
      const matches = (!filterStatus || r.status===filterStatus) && (!query || r.host.includes(query) || r.service.toLowerCase().includes(query));
      if (!matches) return;
      visible.push(r);
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td class="mono">${r.host}</td>
        <td class="num">${r.port}</td>
        <td>${r.service}</td>
        <td><span class="pill ${r.status}"><span class="pdot"></span>${r.status}</span></td>
        <td class="num muted-col">${r.latency==null?'—':r.latency+' ms'}</td>
        <td class="num muted-col">${relSeen(r.seen)}</td>`;
      tbody.appendChild(tr);
    });
    if (visible.length === 0) {
      const tr = document.createElement('tr');
      tr.innerHTML = `<td colspan="6" class="empty-state">No rows match the current filter.</td>`;
      tbody.appendChild(tr);
    }
    document.querySelectorAll('thead th').forEach(th => {
      th.classList.remove('sorted-asc','sorted-desc');
      if (th.dataset.col === sortCol && sortDir !== 0) th.classList.add(sortDir===1?'sorted-asc':'sorted-desc');
    });
    const ct = { open:0, filtered:0, closed:0, error:0 };
    rows.forEach(r => ct[r.status]++);
    document.getElementById('ctOpen').textContent = ct.open;
    document.getElementById('ctFil').textContent = ct.filtered;
    document.getElementById('ctClo').textContent = ct.closed;
    document.getElementById('ctErr').textContent = ct.error;
    document.querySelectorAll('.pill-filter').forEach(b => b.classList.toggle('active', b.dataset.st === filterStatus));
    document.getElementById('footRight').textContent = `${visible.length} of ${rows.length} rows`;
    const latencies = rows.filter(r => r.latency != null).map(r => r.latency).sort((a,b)=>a-b);
    const median = latencies.length ? latencies[Math.floor(latencies.length/2)] : 0;
    document.getElementById('footLeft').textContent = `${rows.length} rows · ${ct.open} open · ${ct.filtered} filtered · ${ct.closed} closed · ${ct.error} error`;
    document.querySelector('tfoot .right').textContent = `median ${median} ms`;
  }
  document.querySelectorAll('thead th').forEach(th => {
    th.addEventListener('click', () => {
      const col = th.dataset.col;
      if (sortCol !== col) { sortCol = col; sortDir = 1; }
      else if (sortDir === 1) sortDir = -1;
      else { sortCol = null; sortDir = 0; }
      render();
    });
  });
  document.querySelectorAll('.pill-filter').forEach(b => {
    b.addEventListener('click', () => { filterStatus = filterStatus === b.dataset.st ? null : b.dataset.st; render(); });
  });
  document.getElementById('search').addEventListener('input', e => { query = e.target.value.trim().toLowerCase(); render(); });
  render();
</script>
</body></html>
